  name: TMPCLIENTLIST
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    -- This block replicates the procedural parent ID assignment\
      \ from the original procedure.\n    -- It first fills the last existing group,\
      \ then creates new groups in batches of 300.\n    LET NO_ROWS INT := 300;\n\
      \    LET MAX_GROUP_ID INT;\n    LET COUNT_OF_MAX_GROUP_ID INT;\n    LET MAX_EXISTING_GROUP_ID\
      \ INT;\n\n    SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_'\
      \ IN PARENT_PLANNING_ID) - 1) AS INT)) INTO :MAX_GROUP_ID FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT;\n\
      \    SELECT COUNT(1) INTO :COUNT_OF_MAX_GROUP_ID FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT\
      \ WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID)\
      \ - 1) AS INT) = :MAX_GROUP_ID;\n    SELECT MAX(EXISTING_GROUP_ID) INTO :MAX_EXISTING_GROUP_ID\
      \ FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST') }};\n\n \
      \   IF (:MAX_EXISTING_GROUP_ID = :MAX_GROUP_ID) THEN\n        COUNT_OF_MAX_GROUP_ID\
      \ := 0;\n    END IF;\n\n    -- Step 1: Fill the last existing parent_planning_id\
      \ group.\n    LET ROWS_TO_FILL INT := :NO_ROWS - :COUNT_OF_MAX_GROUP_ID;\n \
      \   IF (:MAX_GROUP_ID IS NOT NULL AND :MAX_EXISTING_GROUP_ID <> :MAX_GROUP_ID\
      \ AND :ROWS_TO_FILL > 0) THEN\n        UPDATE {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMPCLIENTLIST') }} AS TGT\n        SET\n            NEW_PARENT_GROUP_ID =\
      \ :MAX_GROUP_ID,\n            NEW_PARENT_PLANNING_ID = :MAX_GROUP_ID || '_Client_Parent',\n\
      \            NEW_PARENT_CLIENT_COUNT = :COUNT_OF_MAX_GROUP_ID + SRC.RN\n   \
      \     FROM (\n            SELECT PLANNING_ID, ROW_NUMBER() OVER (ORDER BY ROW_ID)\
      \ as RN\n            FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST')\
      \ }}\n            WHERE NEW_PARENT_GROUP_ID IS NULL\n        ) AS SRC\n    \
      \    WHERE TGT.PLANNING_ID = SRC.PLANNING_ID AND SRC.RN <= :ROWS_TO_FILL;\n\
      \    END IF;\n\n    -- Step 2: Set-based update for remaining rows, replicating\
      \ the WHILE loop.\n    LET COUNTER_START INT := COALESCE(:MAX_GROUP_ID, 0) +\
      \ 1;\n    UPDATE {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST')\
      \ }} AS TGT\n    SET\n        NEW_PARENT_GROUP_ID = SRC.ASSIGNED_GROUP_ID,\n\
      \        NEW_PARENT_PLANNING_ID = SRC.ASSIGNED_GROUP_ID || '_Client_Parent',\n\
      \        NEW_PARENT_CLIENT_COUNT = SRC.COUNT_IN_GROUP,\n        NEW_PARENT_FLAG\
      \ = 'Y'\n    FROM (\n        SELECT\n            T.PLANNING_ID,\n          \
      \  :COUNTER_START + FLOOR((ROW_NUMBER() OVER (ORDER BY T.ROW_ID) - 1) / :NO_ROWS)\
      \ AS ASSIGNED_GROUP_ID,\n            (ROW_NUMBER() OVER (PARTITION BY ASSIGNED_GROUP_ID\
      \ ORDER BY T.ROW_ID)) AS COUNT_IN_GROUP\n        FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMPCLIENTLIST') }} AS T\n        WHERE T.NEW_PARENT_GROUP_ID IS NULL\n  \
      \  ) AS SRC\n    WHERE TGT.PLANNING_ID = SRC.PLANNING_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
