  name: PLANNING_FCCS_CLIENT_NEW_PARENTS
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    USE DATABASE PLANNING_ALLIANT;\n    UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT\
      \ AS C\n    SET\n        PARENT_PLANNING_ID = SOURCE.NEW_PARENT_PLANNING_ID,\n\
      \        CLIENT_STATUS_INDICATOR = 'U',\n        CURRENT_FLAG = 'Y',\n     \
      \   DW_DATE_UPDATED = CURRENT_TIMESTAMP(),\n        DW_UPDATE_USER = 'sppa_planning_fccs_client_update_duplicate_lookup_alias_parent_id'\n\
      \    FROM (\n        SELECT L.PLANNING_ID, L.NEW_PARENT_PLANNING_ID\n      \
      \  FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST') }} AS L\n\
      \        INNER JOIN PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC ON L.NEW_PARENT_PLANNING_ID\
      \ = PC.PLANNING_ID\n    ) AS SOURCE\n    WHERE C.PLANNING_ID = SOURCE.PLANNING_ID\n\
      \      AND C.PARENT_PLANNING_ID <> SOURCE.NEW_PARENT_PLANNING_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
