name: ACA_PAYEE
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_PAYEE AS T
      SET T.ACA_IRS_FORM_1099_TYPE_ID = S.ACA_IRS_FORM_1099_TYPE_ID,
          T.LAST_NAME_ENCRYPTED = S.LAST_NAME_ENCRYPTED,
          T.FIRST_NAME_ENCRYPTED = S.FIRST_NAME_ENCRYPTED,
          T.ORGANIZATION_ENCRYPTED = S.ORGANIZATION_ENCRYPTED,
          T.ADDRESS_ENCRYPTED = S.ADDRESS_ENCRYPTED,
          T.CITY = S.CITY,
          T.STATE_CODE = S.STATE_CODE,
          T.ZIP_CODE = S.ZIP_CODE,
          T.COUNTRY_CODE = S.COUNTRY_CODE,
          T.IRS_FORM_1099_TYPE_CODE = S.IRS_FORM_1099_TYPE_CODE,
          T.IRS_FORM_1099_TYPE = S.IRS_FORM_1099_TYPE,
          T.MAIL_TO_TYPE = S.MAIL_TO_TYPE,
          T.MAIL_TO_ENCRYPTED = S.MAIL_TO_ENCRYPTED,
          T.MAIL_TO_LAST_NAME_ENCRYPTED = S.MAIL_TO_LAST_NAME_ENCRYPTED,
          T.MAIL_TO_FIRST_NAME_ENCRYPTED = S.MAIL_TO_FIRST_NAME_ENCRYPTED,
          T.MAIL_TO_ORGANIZATION_ENCRYPTED = S.MAIL_TO_ORGANIZATION_ENCRYPTED,
          T.MAIL_TO_ADDRESS_ENCRYPTED = S.MAIL_TO_ADDRESS_ENCRYPTED,
          T.MAIL_TO_CITY = S.MAIL_TO_CITY,
          T.MAIL_TO_STATE_CODE = S.MAIL_TO_STATE_CODE,
          T.MAIL_TO_ZIP_CODE = S.MAIL_TO_ZIP_CODE,
          T.MAIL_TO_COUNTRY_CODE = S.MAIL_TO_COUNTRY_CODE,
          T.ACA_SOURCE_SYSTEM_ID_WINNER = S.ACA_SOURCE_SYSTEM_ID_WINNER,
          T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),
          T.ACA_UPDATE_USER = 'dbo.spaca_aca_payee_insertUpdate'
      FROM {{ ref('DBSHIFT', 'ACA_PAYEE_STAGING') }} AS S
      WHERE S.SOURCE_SYSTEM_PAYEE_ID = T.SOURCE_SYSTEM_PAYEE_ID
        AND T.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()
        AND (
          IFNULL(T.ACA_IRS_FORM_1099_TYPE_ID, -1) = IFNULL(S.ACA_IRS_FORM_1099_TYPE_ID, -1)
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.LAST_NAME_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.LAST_NAME_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.FIRST_NAME_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.FIRST_NAME_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.ORGANIZATION_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.ORGANIZATION_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.ADDRESS_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.ADDRESS_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(T.CITY, '') <> IFNULL(S.CITY, '')
          OR IFNULL(T.STATE_CODE, '') <> IFNULL(S.STATE_CODE, '')
          OR IFNULL(T.ZIP_CODE, '') <> IFNULL(S.ZIP_CODE, '')
          OR IFNULL(T.COUNTRY_CODE, '') <> IFNULL(S.COUNTRY_CODE, '')
          OR IFNULL(T.IRS_FORM_1099_TYPE_CODE, '') <> IFNULL(S.IRS_FORM_1099_TYPE_CODE, '')
          OR IFNULL(T.IRS_FORM_1099_TYPE, '') <> IFNULL(S.IRS_FORM_1099_TYPE, '')
          OR IFNULL(T.MAIL_TO_TYPE, '') <> IFNULL(S.MAIL_TO_TYPE, '')
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.MAIL_TO_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.MAIL_TO_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.MAIL_TO_LAST_NAME_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.MAIL_TO_LAST_NAME_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.MAIL_TO_FIRST_NAME_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.MAIL_TO_FIRST_NAME_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.MAIL_TO_ORGANIZATION_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.MAIL_TO_ORGANIZATION_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(T.MAIL_TO_ADDRESS_ENCRYPTED) AS VARCHAR(256)), '') <> IFNULL(CAST(SNOWFLAKE_UDF_DECRYPT(S.MAIL_TO_ADDRESS_ENCRYPTED) AS VARCHAR(256)), '') /* TODO: Replace SNOWFLAKE_UDF_DECRYPT with actual Snowflake decryption UDF */
          OR IFNULL(T.MAIL_TO_CITY, '') <> IFNULL(S.MAIL_TO_CITY, '')
          OR IFNULL(T.MAIL_TO_STATE_CODE, '') <> IFNULL(S.MAIL_TO_STATE_CODE, '')
          OR IFNULL(T.MAIL_TO_ZIP_CODE, '') <> IFNULL(S.MAIL_TO_ZIP_CODE, '')
          OR IFNULL(T.MAIL_TO_COUNTRY_CODE, '') <> IFNULL(S.MAIL_TO_COUNTRY_CODE, '')
        );
      END;
