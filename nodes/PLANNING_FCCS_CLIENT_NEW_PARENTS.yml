operation:
  name: PLANNING_FCCS_CLIENT_NEW_PARENTS
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS C\nSET\n    PARENT_PLANNING_ID\
      \ = SOURCE.NEW_PARENT_PLANNING_ID,\n    CLIENT_STATUS_INDICATOR = 'U',\n   \
      \ CURRENT_FLAG = 'Y',\n    DW_DATE_UPDATED = CURRENT_TIMESTAMP(),\n    DW_UPDATE_USER\
      \ = 'sppa_planning_fccs_client_update_duplicate_lookup_alias_parent_id'\nFROM\
      \ (\n    SELECT \n        L.PLANNING_ID, \n        L.NEW_PARENT_PLANNING_ID\n\
      \    FROM {{ ref('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST') }} AS L\n    INNER\
      \ JOIN PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT AS PC ON L.NEW_PARENT_PLANNING_ID\
      \ = PC.PLANNING_ID\n) AS SOURCE\nWHERE C.PLANNING_ID = SOURCE.PLANNING_ID\n\
      \  AND C.PARENT_PLANNING_ID <> SOURCE.NEW_PARENT_PLANNING_ID;"
