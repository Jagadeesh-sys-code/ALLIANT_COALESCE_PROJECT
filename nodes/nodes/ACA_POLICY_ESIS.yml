  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    UPDATE ALLIANT_CLAIMS_ASTRUS.DBO.ACA_POLICY_ESIS AS T\n \
      \   SET \n        T.ACA_DATE_ID_EXPIRATION_DATE = CAST(TO_VARCHAR(S.EXPIRATION_DATE,\
      \ 'YYYYMMDD') AS INT),\n        T.EXPIRATION_DATE = S.EXPIRATION_DATE,\n   \
      \     T.ACA_DATE_UPDATED = CURRENT_TIMESTAMP(),\n        T.ACA_UPDATE_USER =\
      \ 'spaca_aca_policy_esis_insertUpdate'\n    FROM {{ ref('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_POLICY_STAGING_ESIS') }} AS S\n    WHERE T.SOURCE_SYSTEM_POLICY_ID =\
      \ S.SOURCE_SYSTEM_POLICY_ID\n      AND T.ACA_SOURCE_SYSTEM_ID = S.ACA_SOURCE_SYSTEM_ID\n\
      \      AND T.ACA_DATE_CREATED <> CURRENT_TIMESTAMP()\n      AND IFNULL(T.EXPIRATION_DATE,\
      \ CAST('1776-07-04' AS DATE)) <> IFNULL(S.EXPIRATION_DATE, CAST('1776-07-04'\
      \ AS DATE));\nEND;"
