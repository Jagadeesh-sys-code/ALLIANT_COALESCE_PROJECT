            nodeName: ACA_TRANSACTION_PAYMENT
          - locationName: ALLIANT_CLAIMS_ASTRUS_STAGE_DBO
            nodeName: TEMP_TRANSACTION_PAYMENT_PAYMENT
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_COVERAGE_CODE
          - locationName: ALLIANT_CLAIMS_ASTRUS_REF
            nodeName: ACA_RESERVE_TYPE_MAPPING
          - locationName: ALLIANT_CLAIMS_ASTRUS_DBO
            nodeName: ACA_SOURCE_SYSTEM
          - locationName: ALLIANT_CLAIMS_ASTRUS_STAGE_DBO
            nodeName: TEMP_GB_PAYMENT_PAYEE
        join:
          joinCondition: 'FROM {{ ref(''ALLIANT_CLAIMS_ASTRUS_DBO'', ''ACA_TRANSACTION_PAYMENT'')
            }} AS P

            INNER JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_STAGE_DBO'', ''TEMP_TRANSACTION_PAYMENT_PAYMENT'')
            }} AS TP ON TP.ACA_TRANSACTION_PAYMENT_ID = P.ACA_TRANSACTION_PAYMENT_ID

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_REF'', ''ACA_COVERAGE_CODE'')
            }} AS CC ON CC.CODE = TP.CLAIM_COVERAGE_CODE

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_REF'', ''ACA_RESERVE_TYPE_MAPPING'')
            }} AS RT ON RT.CLASS_CODE = CC.CLASS AND RT.RESERVE_TYPE_COLUMN_NUMBER
            = TP.RESERVE_TYPE_COLUMN_NUMBER AND RT.ACA_SOURCE_SYSTEM_ID = (SELECT
            ACA_SOURCE_SYSTEM_ID FROM {{ ref(''ALLIANT_CLAIMS_ASTRUS_DBO'', ''ACA_SOURCE_SYSTEM'')
            }} WHERE SOURCE_SYSTEM = ''GB'')

            LEFT JOIN {{ ref(''ALLIANT_CLAIMS_ASTRUS_STAGE_DBO'', ''TEMP_GB_PAYMENT_PAYEE'')
            }} AS PP ON PP.ACA_TRANSACTION_PAYMENT_ID = TP.ACA_TRANSACTION_PAYMENT_ID

            '
