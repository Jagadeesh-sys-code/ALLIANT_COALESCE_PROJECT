operation:
  name: TMPROWRANK
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\nUSE DATABASE ALLIANT_ONE;\nUPDATE ALLIANT_ONE.STG.AO_CLAIM_STAGING\
      \ AS s\nSET \n    sf_account_id = source.sf_account_id,\n    rowrank = source.rowRank,\n\
      \    sf_account_owner_id = source.sf_account_owner_id\nFROM (\n    SELECT \n\
      \        s_from.guid,\n        s_from.RecordHashByte,\n        s_from.claimnumber,\n\
      \        s_from.claimnumbersuffix,\n        r.sf_account_id, \n        t.rowRank,\
      \ \n        r.sf_account_owner_id\n    FROM ALLIANT_ONE.STG.AO_CLAIM_STAGING\
      \ AS s_from\n    LEFT JOIN (\n        SELECT epic_client_lookup_code, sf_account_id,\
      \ sf_account_owner_id\n        FROM ALLIANT_ONE.DBO.AO_RESPONSE_FEED\n     \
      \   WHERE sf_account_id IS NOT NULL\n        GROUP BY 1, 2, 3\n    ) AS r ON\
      \ s_from.epiclookupcode = r.epic_client_lookup_code\n    LEFT JOIN {{ ref_no_link('ALLIANT_ONE_STG',\
      \ 'TMPROWRANK') }} AS t \n        ON s_from.guid = t.guid\n        AND s_from.RecordHashByte\
      \ = t.RecordHashByte\n        AND s_from.claimnumber = t.claimnumber\n     \
      \   AND COALESCE(s_from.claimnumbersuffix, 'xx') = COALESCE(t.claimnumbersuffix,\
      \ 'xx')\n) AS source\nWHERE \n    s.guid = source.guid AND\n    s.RecordHashByte\
      \ = source.RecordHashByte AND\n    s.claimnumber = source.claimnumber AND\n\
      \    COALESCE(s.claimnumbersuffix, 'xx') = COALESCE(source.claimnumbersuffix,\
      \ 'xx');\nEND;"
    preSQL: "BEGIN\nUSE DATABASE ALLIANT_ONE;\nUPDATE ALLIANT_ONE.STG.AO_CLAIM_STAGING\n\
      SET RecordHashByte = SHA1_BINARY(\n    COALESCE(carriername, '-x') || ' | '\
      \ ||\n    COALESCE(claimnumber, '-x') || ' | ' ||\n    COALESCE(claimnumbersuffix,\
      \ '-x') || ' | ' ||\n    COALESCE(claimreporteddate, '-x') || ' | ' ||\n   \
      \ COALESCE(clientname, '-x') || ' | ' ||\n    COALESCE(policynumber, '-x') ||\
      \ ' | ' ||\n    COALESCE(epiclookupcode, '-x') || ' | ' ||\n    COALESCE(epicpolicynumber,\
      \ '-x') || ' | ' ||\n    COALESCE(policycustomername, '-x') || ' | ' ||\n  \
      \  COALESCE(TO_VARCHAR(policyyear), '-x') || ' | ' ||\n    COALESCE(policyeffectivedate,\
      \ '-x') || ' | ' ||\n    COALESCE(policyexpirationdate, '-x') || ' | ' ||\n\
      \    COALESCE(policycoveragetype, '-x') || ' | ' ||\n    COALESCE(policycoveragekind,\
      \ '-x') || ' | ' ||\n    COALESCE(claimantnamefull, '-x') || ' | ' ||\n    COALESCE(claimstatus,\
      \ '-x') || ' | ' ||\n    COALESCE(claimantage, '-x') || ' | ' ||\n    COALESCE(claimcloseddate,\
      \ '-x') || ' | ' ||\n    COALESCE(claimmajorclasscode, '-x') || ' | ' ||\n \
      \   COALESCE(lossdatetime, '-x') || ' | ' ||\n    COALESCE(losstype, '-x') ||\
      \ ' | ' ||\n    COALESCE(lossstate, '-x') || ' | ' ||\n    COALESCE(lossaccidentdescription,\
      \ '-x') || ' | ' ||\n    COALESCE(valuationdate, '-x') || ' | ' ||\n    COALESCE(currencytype,\
      \ '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(indemnityincurred), '-x') || '\
      \ | ' ||\n    COALESCE(TO_VARCHAR(paidindemnitypaid), '-x') || ' | ' ||\n  \
      \  COALESCE(TO_VARCHAR(reserveindemnity), '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(medicalincurred),\
      \ '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(reservemedical), '-x') || ' | '\
      \ ||\n    COALESCE(TO_VARCHAR(medicalpaid), '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(expensesincurred),\
      \ '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(reservesexpense), '-x') || ' |\
      \ ' ||\n    COALESCE(TO_VARCHAR(expensepaid), '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(propertyincurred),\
      \ '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(propertyreserve), '-x') || ' |\
      \ ' ||\n    COALESCE(TO_VARCHAR(propertydamagepaid), '-x') || ' | ' ||\n   \
      \ COALESCE(TO_VARCHAR(totalrecoveries), '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(paidlegal),\
      \ '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(paidbodilyinjury), '-x') || ' |\
      \ ' ||\n    COALESCE(TO_VARCHAR(reservetotal), '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(totalpaid),\
      \ '-x') || ' | ' ||\n    COALESCE(TO_VARCHAR(totalincurred), '-x') || ' | '\
      \ ||\n    COALESCE(source_company, '-x') || ' | ' \n),\nHashSum = \n    indemnityincurred\
      \ +\n    paidindemnitypaid +\n    reserveindemnity +\n    medicalincurred +\n\
      \    medicalpaid +\n    reservemedical +\n    expensesincurred +\n    expensepaid\
      \ +\n    reservesexpense +\n    propertyincurred +\n    propertydamagepaid +\n\
      \    propertyreserve +\n    paidlegal +\n    paidbodilyinjury +\n    reservetotal\
      \ +\n    totalpaid +\n    totalincurred +\n    totalrecoveries;\nEND;"
    testsEnabled: true
    truncateBefore: true
