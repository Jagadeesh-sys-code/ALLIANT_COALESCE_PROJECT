  name: TMPCLIENTLIST
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    LET NO_ROWS DECIMAL(8, 2) := 300.00;\n    LET MAX_GROUP_ID\
      \ INT;\n    LET COUNT_OF_MAX_GROUP_ID INT;\n    LET COUNTER INT;\n    LET EXISTING_GROUP_ROW_COUNT\
      \ INT := 0;\n    LET NEW_GROUP_COUNT INT := 0;\n    LET NEW_GROUP_ROWS INT :=\
      \ 0;\n    LET MAX_EXISTING_GROUP_ID INT;\n    \n    SELECT MAX(CAST(EXISTING_GROUP_ID\
      \ AS INT)) INTO :MAX_EXISTING_GROUP_ID FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMPCLIENTLIST') }};\n\n    SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,\
      \ 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS INT)) INTO :MAX_GROUP_ID FROM\
      \ {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }};\n    SELECT COUNT(1)\
      \ INTO :COUNT_OF_MAX_GROUP_ID FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
      \ }} WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID)\
      \ - 1) AS INT) = :MAX_GROUP_ID;\n\n    IF (:MAX_EXISTING_GROUP_ID = :MAX_GROUP_ID)\
      \ THEN\n        SELECT 0 INTO :COUNT_OF_MAX_GROUP_ID;\n    END IF;\n\n    IF\
      \ (:MAX_GROUP_ID IS NOT NULL AND :MAX_EXISTING_GROUP_ID <> :MAX_GROUP_ID) THEN\n\
      \        LET ROWS_TO_UPDATE INT := CAST(:NO_ROWS AS INT) - :COUNT_OF_MAX_GROUP_ID;\n\
      \        UPDATE {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST')\
      \ }} AS T\n        SET \n            T.NEW_PARENT_GROUP_ID = :MAX_GROUP_ID,\n\
      \            T.NEW_PARENT_PLANNING_ID = :MAX_GROUP_ID || '_Client_Parent',\n\
      \            T.NEW_PARENT_CLIENT_COUNT = :COUNT_OF_MAX_GROUP_ID + S.RN\n   \
      \     FROM (\n            SELECT PLANNING_ID, ROW_NUMBER() OVER (ORDER BY PLANNING_ID)\
      \ AS RN\n            FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST')\
      \ }}\n            WHERE NEW_PARENT_GROUP_ID IS NULL\n        ) AS S\n      \
      \  WHERE T.PLANNING_ID = S.PLANNING_ID AND S.RN <= ROWS_TO_UPDATE;\n       \
      \ EXISTING_GROUP_ROW_COUNT := SQLROWCOUNT + :EXISTING_GROUP_ROW_COUNT;\n   \
      \ END IF;\n\n    COUNTER := COALESCE(:MAX_GROUP_ID, 0) + 1;\n    WHILE ((SELECT\
      \ COUNT(1) FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST')\
      \ }} WHERE NEW_PARENT_GROUP_ID IS NULL) > 0) DO\n\n        UPDATE {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMPCLIENTLIST') }} AS T\n        SET \n            T.NEW_PARENT_GROUP_ID\
      \ = :COUNTER,\n            T.NEW_PARENT_PLANNING_ID = :COUNTER || '_Client_Parent',\n\
      \            T.NEW_PARENT_CLIENT_COUNT = S.RN - :EXISTING_GROUP_ROW_COUNT -\
      \ :NEW_GROUP_ROWS,\n            T.NEW_PARENT_FLAG = 'Y'\n        FROM (\n  \
      \          SELECT PLANNING_ID, ROW_NUMBER() OVER (ORDER BY PLANNING_ID) AS RN\n\
      \            FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPCLIENTLIST')\
      \ }}\n            WHERE NEW_PARENT_GROUP_ID IS NULL\n        ) AS S\n      \
      \  WHERE T.PLANNING_ID = S.PLANNING_ID AND S.RN <= CAST(:NO_ROWS AS INT);\n\n\
      \        COUNTER := :COUNTER + 1;\n        NEW_GROUP_COUNT := :NEW_GROUP_COUNT\
      \ + 1;\n        NEW_GROUP_ROWS := :NO_ROWS * :NEW_GROUP_COUNT;\n\n    END WHILE;\n\
      END;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
