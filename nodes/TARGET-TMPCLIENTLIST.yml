name: TMPCLIENTLIST
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          -- This block replicates the procedural parent ID assignment from the original procedure.
          -- It first fills the last existing group, then creates new groups in batches of 300.
          LET NO_ROWS INT := 300;
          LET MAX_GROUP_ID INT;
          LET COUNT_OF_MAX_GROUP_ID INT;
          LET MAX_EXISTING_GROUP_ID INT;

          SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS INT)) INTO :MAX_GROUP_ID FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT;
          SELECT COUNT(1) INTO :COUNT_OF_MAX_GROUP_ID FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_CLIENT WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS INT) = :MAX_GROUP_ID;
          SELECT MAX(EXISTING_GROUP_ID) INTO :MAX_EXISTING_GROUP_ID FROM "TARGET"."TARGET"."TMPCLIENTLIST";

          IF (:MAX_EXISTING_GROUP_ID = :MAX_GROUP_ID) THEN
              COUNT_OF_MAX_GROUP_ID := 0;
          END IF;

          -- Step 1: Fill the last existing parent_planning_id group.
          LET ROWS_TO_FILL INT := :NO_ROWS - :COUNT_OF_MAX_GROUP_ID;
          IF (:MAX_GROUP_ID IS NOT NULL AND :MAX_EXISTING_GROUP_ID <> :MAX_GROUP_ID AND :ROWS_TO_FILL > 0) THEN
              UPDATE "TARGET"."TARGET"."TMPCLIENTLIST" AS TGT
              SET
                  NEW_PARENT_GROUP_ID = :MAX_GROUP_ID,
                  NEW_PARENT_PLANNING_ID = :MAX_GROUP_ID || '_Client_Parent',
                  NEW_PARENT_CLIENT_COUNT = :COUNT_OF_MAX_GROUP_ID + SRC.RN
              FROM (
                  SELECT PLANNING_ID, ROW_NUMBER() OVER (ORDER BY ROW_ID) as RN
                  FROM "TARGET"."TARGET"."TMPCLIENTLIST"
                  WHERE NEW_PARENT_GROUP_ID IS NULL
              ) AS SRC
              WHERE TGT.PLANNING_ID = SRC.PLANNING_ID AND SRC.RN <= :ROWS_TO_FILL;
          END IF;

          -- Step 2: Set-based update for remaining rows, replicating the WHILE loop.
          LET COUNTER_START INT := COALESCE(:MAX_GROUP_ID, 0) + 1;
          UPDATE "TARGET"."TARGET"."TMPCLIENTLIST" AS TGT
          SET
              NEW_PARENT_GROUP_ID = SRC.ASSIGNED_GROUP_ID,
              NEW_PARENT_PLANNING_ID = SRC.ASSIGNED_GROUP_ID || '_Client_Parent',
              NEW_PARENT_CLIENT_COUNT = SRC.COUNT_IN_GROUP,
              NEW_PARENT_FLAG = 'Y'
          FROM (
              SELECT
                  PLANNING_ID,
                  ASSIGNED_GROUP_ID,
                  ROW_NUMBER() OVER (PARTITION BY ASSIGNED_GROUP_ID ORDER BY ROW_ID) AS COUNT_IN_GROUP
              FROM (
                  SELECT
                      T.PLANNING_ID,
                      T.ROW_ID,
                      :COUNTER_START + FLOOR((RN - 1) / :NO_ROWS) AS ASSIGNED_GROUP_ID
                  FROM (
                      SELECT
                          PLANNING_ID,
                          ROW_ID,
                          ROW_NUMBER() OVER (ORDER BY ROW_ID) AS RN
                      FROM "TARGET"."TARGET"."TMPCLIENTLIST"
                      WHERE NEW_PARENT_GROUP_ID IS NULL
                  ) AS T
              )
          ) AS SRC
          WHERE TGT.PLANNING_ID = SRC.PLANNING_ID;
      END;
    preSQL: ""
