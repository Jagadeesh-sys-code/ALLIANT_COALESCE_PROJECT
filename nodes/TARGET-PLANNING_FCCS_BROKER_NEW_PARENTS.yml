operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;
          UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER AS C
          SET
              PARENT_PLANNING_ID = L.NEW_PARENT_PLANNING_ID,
              BROKER_STATUS_INDICATOR = 'U',
              CURRENT_FLAG = 'Y',
              DW_DATE_UPDATED = CURRENT_TIMESTAMP(),
              DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_BROKER_UPDATE_DUPLICATE_LOOKUP_ALIAS_PARENT_ID'
          FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPBROKERLIST') }} AS L
          INNER JOIN PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER AS PB ON L.NEW_PARENT_PLANNING_ID = PB.PLANNING_ID
          WHERE C.PLANNING_ID = L.PLANNING_ID
            AND C.PARENT_PLANNING_ID <> L.NEW_PARENT_PLANNING_ID;
      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
