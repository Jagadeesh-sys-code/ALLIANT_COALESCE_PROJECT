name: TMPROWRANK
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
      USE DATABASE ALLIANT_ONE;
      UPDATE ALLIANT_ONE.PUBLIC.AO_CLAIM_STAGING AS s
      SET 
          sf_account_id = source.sf_account_id,
          rowrank = source.rowRank,
          sf_account_owner_id = source.sf_account_owner_id
      FROM (
          SELECT 
              s_from.guid,
              s_from.RecordHashByte,
              s_from.claimnumber,
              s_from.claimnumbersuffix,
              r.sf_account_id, 
              t.rowRank, 
              r.sf_account_owner_id
          FROM ALLIANT_ONE.PUBLIC.AO_CLAIM_STAGING AS s_from
          LEFT JOIN (
              SELECT epic_client_lookup_code, sf_account_id, sf_account_owner_id
              FROM ALLIANT_ONE.DBO.AO_RESPONSE_FEED
              WHERE sf_account_id IS NOT NULL
              GROUP BY 1, 2, 3
          ) AS r ON s_from.epiclookupcode = r.epic_client_lookup_code
          LEFT JOIN {{ ref_no_link('TARGET', 'TMPROWRANK') }} AS t 
              ON s_from.guid = t.guid
              AND s_from.RecordHashByte = t.RecordHashByte
              AND s_from.claimnumber = t.claimnumber
              AND COALESCE(s_from.claimnumbersuffix, 'xx') = COALESCE(t.claimnumbersuffix, 'xx')
      ) AS source
      WHERE 
          s.guid = source.guid AND
          s.RecordHashByte = source.RecordHashByte AND
          s.claimnumber = source.claimnumber AND
          COALESCE(s.claimnumbersuffix, 'xx') = COALESCE(source.claimnumbersuffix, 'xx');
      END;
    preSQL: |-
      BEGIN
      USE DATABASE ALLIANT_ONE;
      UPDATE ALLIANT_ONE.PUBLIC.AO_CLAIM_STAGING
      SET RecordHashByte = SHA1_BINARY(
          COALESCE(carriername, '-x') || ' | ' ||
          COALESCE(claimnumber, '-x') || ' | ' ||
          COALESCE(claimnumbersuffix, '-x') || ' | ' ||
          COALESCE(claimreporteddate, '-x') || ' | ' ||
          COALESCE(clientname, '-x') || ' | ' ||
          COALESCE(policynumber, '-x') || ' | ' ||
          COALESCE(epiclookupcode, '-x') || ' | ' ||
          COALESCE(epicpolicynumber, '-x') || ' | ' ||
          COALESCE(policycustomername, '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(policyyear), '-x') || ' | ' ||
          COALESCE(policyeffectivedate, '-x') || ' | ' ||
          COALESCE(policyexpirationdate, '-x') || ' | ' ||
          COALESCE(policycoveragetype, '-x') || ' | ' ||
          COALESCE(policycoveragekind, '-x') || ' | ' ||
          COALESCE(claimantnamefull, '-x') || ' | ' ||
          COALESCE(claimstatus, '-x') || ' | ' ||
          COALESCE(claimantage, '-x') || ' | ' ||
          COALESCE(claimcloseddate, '-x') || ' | ' ||
          COALESCE(claimmajorclasscode, '-x') || ' | ' ||
          COALESCE(lossdatetime, '-x') || ' | ' ||
          COALESCE(losstype, '-x') || ' | ' ||
          COALESCE(lossstate, '-x') || ' | ' ||
          COALESCE(lossaccidentdescription, '-x') || ' | ' ||
          COALESCE(valuationdate, '-x') || ' | ' ||
          COALESCE(currencytype, '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(indemnityincurred), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(paidindemnitypaid), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(reserveindemnity), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(medicalincurred), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(reservemedical), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(medicalpaid), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(expensesincurred), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(reservesexpense), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(expensepaid), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(propertyincurred), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(propertyreserve), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(propertydamagepaid), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(totalrecoveries), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(paidlegal), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(paidbodilyinjury), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(reservetotal), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(totalpaid), '-x') || ' | ' ||
          COALESCE(TO_VARCHAR(totalincurred), '-x') || ' | ' ||
          COALESCE(source_company, '-x') || ' | ' 
      ),
      HashSum = 
          indemnityincurred +
          paidindemnitypaid +
          reserveindemnity +
          medicalincurred +
          medicalpaid +
          reservemedical +
          expensesincurred +
          expensepaid +
          reservesexpense +
          propertyincurred +
          propertydamagepaid +
          propertyreserve +
          paidlegal +
          paidbodilyinjury +
          reservetotal +
          totalpaid +
          totalincurred +
          totalrecoveries;
      END;
    testsEnabled: true
    truncateBefore: true
