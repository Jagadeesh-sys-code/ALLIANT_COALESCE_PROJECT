  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    USE DATABASE PLANNING_ALLIANT;\n    UPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER\
      \ AS C\n    SET\n        PARENT_PLANNING_ID = L.NEW_PARENT_PLANNING_ID,\n  \
      \      BROKER_STATUS_INDICATOR = 'U',\n        CURRENT_FLAG = 'Y',\n       \
      \ DW_DATE_UPDATED = CURRENT_TIMESTAMP(),\n        DW_UPDATE_USER = 'SPPA_PLANNING_FCCS_BROKER_UPDATE_DUPLICATE_LOOKUP_ALIAS_PARENT_ID'\n\
      \    FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPBROKERLIST') }} AS\
      \ L\n    INNER JOIN PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER AS PB ON L.NEW_PARENT_PLANNING_ID\
      \ = PB.PLANNING_ID\n    WHERE C.PLANNING_ID = L.PLANNING_ID\n      AND C.PARENT_PLANNING_ID\
      \ <> L.NEW_PARENT_PLANNING_ID;\nEND;"
