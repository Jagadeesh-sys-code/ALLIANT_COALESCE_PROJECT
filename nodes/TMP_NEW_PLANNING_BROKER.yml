operation:
  name: TMP_NEW_PLANNING_BROKER
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    UPDATE PLANNING_ALLIANT.DBO.TMP_NEW_PLANNING_BROKER AS TGT\n\
      \    SET\n        TGT.GROUP_ID = SRC.NEW_GROUP_ID,\n        TGT.GROUP_NAME =\
      \ SRC.NEW_GROUP_ID || '_Producer_Parent',\n        TGT.PARENT_PLANNING_ID =\
      \ SRC.NEW_GROUP_ID || '_Producer_Parent'\n    FROM (\n        WITH PARAMS AS\
      \ (\n            SELECT\n                COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,\
      \ 1, POSITION('_' IN PARENT_PLANNING_ID) - 1) AS INT)), 0) AS MAX_GROUP_ID,\n\
      \                (SELECT COUNT(1) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_BROKER') }} WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID, 1,\
      \ POSITION('_' IN PARENT_PLANNING_ID) - 1) AS INT) = MAX_GROUP_ID) AS COUNT_OF_MAX_GROUP_ID,\n\
      \                300 AS BATCH_SIZE\n            FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_BROKER') }}\n        ),\n        UNASSIGNED_ROWS AS (\n   \
      \         SELECT\n                ROW_ID,\n                ROW_NUMBER() OVER\
      \ (ORDER BY ROW_ID) AS RN\n            FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'TMP_NEW_PLANNING_BROKER') }}\n            WHERE GROUP_ID IS NULL\n      \
      \  )\n        SELECT\n            UR.ROW_ID,\n            CASE\n           \
      \     WHEN P.MAX_GROUP_ID > 0 AND UR.RN <= (P.BATCH_SIZE - P.COUNT_OF_MAX_GROUP_ID)\
      \ THEN P.MAX_GROUP_ID\n                ELSE P.MAX_GROUP_ID + CEIL( (UR.RN -\
      \ (CASE WHEN P.MAX_GROUP_ID > 0 THEN (P.BATCH_SIZE - P.COUNT_OF_MAX_GROUP_ID)\
      \ ELSE 0 END)) / P.BATCH_SIZE::FLOAT )\n            END AS NEW_GROUP_ID\n  \
      \      FROM UNASSIGNED_ROWS UR\n        CROSS JOIN PARAMS P\n    ) AS SRC\n\
      \    WHERE TGT.ROW_ID = SRC.ROW_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
