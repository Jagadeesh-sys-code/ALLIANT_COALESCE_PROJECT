  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\nUSE DATABASE PLANNING_ALLIANT;\n\nUPDATE PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER\
      \ AS C\nSET\n    PARENT_PLANNING_ID = SOURCE.NEW_PARENT_PLANNING_ID,\n    BROKER_STATUS_INDICATOR\
      \ = 'U',\n    CURRENT_FLAG = 'Y',\n    DW_DATE_UPDATED = CURRENT_TIMESTAMP(),\n\
      \    DW_UPDATE_USER = 'sppa_planning_fccs_broker_update_duplicate_lookup_alias_parent_id'\n\
      FROM (\n    SELECT\n        L.PLANNING_ID,\n        L.NEW_PARENT_PLANNING_ID,\n\
      \        L.EXISTING_PARENT_PLANNING_ID\n    FROM {{ ref('PLANNING_ALLIANT_DBO',\
      \ 'TMPBROKERLIST') }} AS L\n    INNER JOIN PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER\
      \ AS PB ON L.NEW_PARENT_PLANNING_ID = PB.PLANNING_ID\n) AS SOURCE\nWHERE C.PLANNING_ID\
      \ = SOURCE.PLANNING_ID\nAND C.PARENT_PLANNING_ID <> SOURCE.NEW_PARENT_PLANNING_ID;\n\
      END;"
