            STG.SOURCE_SYSTEM_CLIENT_LOOKUP_CODE), ''*'', ''''), STG.SOURCE_SYSTEM_CLIENT_ID,
            STG.DW_SOURCE_SYSTEM_ID, TRY_CAST(SUBSTRING(B.PARENT_PLANNING_ID,1, POSITION(''_''
