        join:
          joinCondition: 'FROM {{ ref(''PLANNING_ALLIANT_DBO'', ''PLANNING_FCCS_ACTUALS_STAGING'')
            }} AS STG

            LEFT OUTER JOIN {{ ref(''PLANNING_ALLIANT_DBO'', ''PLANNING_FCCS_CLIENT'')
            }} AS B ON STG.CLIENT_PLANNING_ID = B.PLANNING_ID

            WHERE STG.CLIENT_PLANNING_ID <> ''No_Client'' AND COALESCE(STG.THRESHOLD_RULE_TYPE,
            ''-1'') NOT IN (''Threshold Client'',''Threshold Structure'')

            GROUP BY B.PARENT_PLANNING_ID, STG.CLIENT_PLANNING_ID, STG.CLIENT_NAME,
            STG.CLIENT_LOOKUP_CODE, STG.CLIENT_STATUS_INDICATOR, STG.CLIENT_ALIAS,
