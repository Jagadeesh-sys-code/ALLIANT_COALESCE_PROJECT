operation:
  name: TMP_NEW_PLANNING_CLIENT
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    USE DATABASE PLANNING_ALLIANT;\n    \n    LET max_group_id_check\
      \ INT := (SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1, POSITION('_' IN\
      \ PARENT_PLANNING_ID)-1) AS INT)) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }});\n\n    IF (max_group_id_check IS NOT NULL) THEN\n\
      \        UPDATE PLANNING_ALLIANT.DBO.TMP_NEW_PLANNING_CLIENT AS TGT\n      \
      \  SET \n            GROUP_ID = SRC.MAX_GROUP_ID,\n            GROUP_NAME =\
      \ SRC.MAX_GROUP_ID || '_Client_Parent',\n            PARENT_PLANNING_ID = SRC.MAX_GROUP_ID\
      \ || '_Client_Parent'\n        FROM (\n            SELECT \n               \
      \ T.ROW_ID, \n                ROW_NUMBER() OVER (ORDER BY T.ROW_ID) AS RN,\n\
      \                CFG.MAX_GROUP_ID,\n                CFG.COUNT_OF_MAX_GROUP_ID,\n\
      \                CFG.NO_ROWS\n            FROM PLANNING_ALLIANT.DBO.TMP_NEW_PLANNING_CLIENT\
      \ AS T\n            CROSS JOIN (\n                SELECT\n                 \
      \   300.00 AS NO_ROWS,\n                    (SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1,\
      \ POSITION('_' IN PARENT_PLANNING_ID)-1) AS INT)) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_CLIENT') }}) AS MAX_GROUP_ID,\n                    (SELECT\
      \ COUNT(1) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
      \ }}  WHERE TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1, POSITION('_' IN PARENT_PLANNING_ID)-1)\
      \ AS INT) = MAX_GROUP_ID) AS COUNT_OF_MAX_GROUP_ID\n            ) CFG\n    \
      \        WHERE T.GROUP_ID IS NULL\n        ) AS SRC\n        WHERE TGT.ROW_ID\
      \ = SRC.ROW_ID\n          AND SRC.RN <= (CAST(SRC.NO_ROWS AS INT) - SRC.COUNT_OF_MAX_GROUP_ID);\n\
      \    END IF;\n\n    UPDATE PLANNING_ALLIANT.DBO.TMP_NEW_PLANNING_CLIENT AS TGT\n\
      \    SET\n        GROUP_ID = SRC.ASSIGNED_GROUP_ID,\n        GROUP_NAME = SRC.ASSIGNED_GROUP_ID\
      \ || '_Client_Parent',\n        PARENT_PLANNING_ID = SRC.ASSIGNED_GROUP_ID ||\
      \ '_Client_Parent'\n    FROM (\n        SELECT\n            R.ROW_ID,\n    \
      \        COALESCE(CFG.MAX_GROUP_VALUE, 0) + CEIL(R.RN / CFG.NO_ROWS::FLOAT)\
      \ AS ASSIGNED_GROUP_ID\n        FROM (\n            SELECT\n               \
      \ T.ROW_ID,\n                ROW_NUMBER() OVER (ORDER BY T.ROW_ID) AS RN\n \
      \           FROM PLANNING_ALLIANT.DBO.TMP_NEW_PLANNING_CLIENT AS T\n       \
      \     WHERE T.GROUP_ID IS NULL\n        ) AS R\n        CROSS JOIN (\n     \
      \       SELECT\n                300.00 AS NO_ROWS,\n                (SELECT\
      \ COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1, POSITION('_' IN PARENT_PLANNING_ID)-1)\
      \ AS INT)), 0) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
      \ }}) AS MAX_GROUP_VALUE\n        ) AS CFG\n    ) AS SRC\n    WHERE TGT.ROW_ID\
      \ = SRC.ROW_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
