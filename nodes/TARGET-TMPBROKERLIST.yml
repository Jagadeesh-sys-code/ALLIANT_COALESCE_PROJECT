name: TMPBROKERLIST
operation:
  config:
    insertStrategy: INSERT
    postSQL: |-
      BEGIN
          USE DATABASE PLANNING_ALLIANT;

          -- ============================================================
          -- BLOCK 1: Fill last existing group up to 300 rows
          -- Equivalent to: IF @max_group_id IS NOT NULL AND @max_existing_group_id <> @max_group_id
          -- ============================================================

          LET max_group_id INT := (
              SELECT MAX(TRY_CAST(REPLACE(PARENT_PLANNING_ID, '_Producer_Parent', '') AS INT))
              FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_BROKER') }}
          );

          LET max_existing_group_id INT := (
              SELECT MAX(EXISTING_GROUP_ID)
              FROM {{ ref_no_link('TARGET', 'TMPBROKERLIST') }}
          );

          IF (max_group_id IS NOT NULL AND max_existing_group_id <> max_group_id) THEN

              UPDATE {{ ref_no_link('TARGET', 'TMPBROKERLIST') }} AS TGT
              SET
                  NEW_PARENT_GROUP_ID     = SRC.MAX_GROUP_ID,
                  NEW_PARENT_PLANNING_ID  = SRC.MAX_GROUP_ID || '_Producer_Parent',
                  NEW_PARENT_BROKER_COUNT = SRC.COUNT_OF_MAX_GROUP_ID + SRC.RN
              FROM (
                  SELECT
                      T.ROW_ID,
                      ROW_NUMBER() OVER (ORDER BY T.ROW_ID) AS RN,
                      CFG.MAX_GROUP_ID,
                      CFG.COUNT_OF_MAX_GROUP_ID
                  FROM {{ ref_no_link('TARGET', 'TMPBROKERLIST') }} T
                  CROSS JOIN (
                      SELECT
                          300.00 AS NO_ROWS,
                          :max_group_id AS MAX_GROUP_ID,
                          (
                              SELECT COUNT(1)
                              FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_BROKER') }}
                              WHERE TRY_CAST(REPLACE(PARENT_PLANNING_ID, '_Producer_Parent', '') AS INT)
                                    = :max_group_id
                          ) AS COUNT_OF_MAX_GROUP_ID
                  ) CFG
                  WHERE T.NEW_PARENT_GROUP_ID IS NULL
              ) SRC
              WHERE TGT.ROW_ID = SRC.ROW_ID
                AND SRC.RN <= (300 - SRC.COUNT_OF_MAX_GROUP_ID);

          END IF;

          -- ============================================================
          -- BLOCK 2: Assign remaining NULL rows into new groups of 300
          -- Equivalent to: WHILE new_parent_group_id IS NULL → UPDATE TOP(300)
          -- ============================================================

          LET counter INT := COALESCE(:max_group_id, 0) + 1;
          LET existing_group_row_count INT := 0;
          LET new_group_count INT := 0;
          LET new_group_rows INT := 0;

          WHILE ((SELECT COUNT(1) FROM {{ ref_no_link('TARGET', 'TMPBROKERLIST') }} WHERE NEW_PARENT_GROUP_ID IS NULL) > 0) DO

              UPDATE {{ ref_no_link('TARGET', 'TMPBROKERLIST') }} AS TGT
              SET
                  NEW_PARENT_GROUP_ID     = SRC.COUNTER_VAL,
                  NEW_PARENT_PLANNING_ID  = SRC.COUNTER_VAL || '_Producer_Parent',
                  NEW_PARENT_BROKER_COUNT = SRC.RN,
                  NEW_PARENT_FLAG         = 'Y'
              FROM (
                  SELECT
                      T.ROW_ID,
                      ROW_NUMBER() OVER (ORDER BY T.ROW_ID) AS RN,
                      :counter AS COUNTER_VAL
                  FROM {{ ref_no_link('TARGET', 'TMPBROKERLIST') }} T
                  WHERE T.NEW_PARENT_GROUP_ID IS NULL
              ) SRC
              WHERE TGT.ROW_ID = SRC.ROW_ID
                AND SRC.RN <= 300;

              LET rows_updated INT := (SELECT COUNT(1) FROM {{ ref_no_link('TARGET', 'TMPBROKERLIST') }} WHERE NEW_PARENT_GROUP_ID = :counter);
              SET existing_group_row_count := :existing_group_row_count + :rows_updated;
              SET counter := :counter + 1;
              SET new_group_count := :new_group_count + 1;
              SET new_group_rows := 300 * :new_group_count;

          END WHILE;

      END;
    preSQL: ""
    testsEnabled: true
    truncateBefore: true
