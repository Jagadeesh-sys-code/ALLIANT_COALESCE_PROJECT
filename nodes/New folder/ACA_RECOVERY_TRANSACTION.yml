operation:
  name: ACA_RECOVERY_TRANSACTION
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: ''
    preSQL: "BEGIN\n    -- Step #1.2: Delete Existing GB Transaction\n    DELETE FROM\
      \ ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION\n    WHERE ACA_SOURCE_SYSTEM_ID\
      \ = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM\
      \ WHERE SOURCE_SYSTEM = 'GB')\n    AND RECOVERY_TRANSACTION_DATE IN (SELECT\
      \ RECOVERY_TRANSACTION_DATE\n                                      FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_RECOVERY_TRANSACTION_STAGING_GB') }}\n                              \
      \        GROUP BY RECOVERY_TRANSACTION_DATE);\n\n    -- Step #1.3: Delete Existing\
      \ ESIS Transaction\n    DELETE FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_RECOVERY_TRANSACTION\n\
      \    WHERE ACA_SOURCE_SYSTEM_ID = (SELECT ACA_SOURCE_SYSTEM_ID FROM ALLIANT_CLAIMS_ASTRUS.DBO.ACA_SOURCE_SYSTEM\
      \ WHERE SOURCE_SYSTEM = 'ESIS')\n    AND RECOVERY_TRANSACTION_DATE IN (SELECT\
      \ RECOVERY_TRANSACTION_DATE\n                                      FROM {{ ref_no_link('ALLIANT_CLAIMS_ASTRUS_STAGE_DBO',\
      \ 'ACA_RECOVERY_TRANSACTION_STAGING_ESIS') }}\n                            \
      \          GROUP BY RECOVERY_TRANSACTION_DATE);\nEND;"
    testsEnabled: true
    truncateBefore: true
  database: ''
  deployEnabled: true
