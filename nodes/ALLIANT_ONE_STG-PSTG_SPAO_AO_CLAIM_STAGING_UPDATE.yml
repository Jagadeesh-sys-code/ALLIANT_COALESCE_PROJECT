fileVersion: 1
id: c7582eb7-e174-45b0-8198-132d0c279d0f
name: PSTG_SPAO_AO_CLAIM_STAGING_UPDATE
operation:
  config:
    insertStrategy: INSERT
    postSQL: ""
    preSQL: |-
      BEGIN
          -- Generate Hash
          UPDATE ALLIANT_ONE.STG.AO_CLAIM_STAGING s
          SET s.RecordHashByte = SHA1_BINARY(
                  COALESCE(s.carriername, '-x') || ' | ' ||
                  COALESCE(s.claimnumber, '-x') || ' | ' ||
                  COALESCE(s.claimnumbersuffix, '-x') || ' | ' ||
                  COALESCE(s.claimreporteddate, '-x') || ' | ' ||
                  COALESCE(s.clientname, '-x') || ' | ' ||
                  COALESCE(s.policynumber, '-x') || ' | ' ||
                  COALESCE(s.epiclookupcode, '-x') || ' | ' ||
                  COALESCE(s.epicpolicynumber, '-x') || ' | ' ||
                  COALESCE(s.policycustomername, '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.policyyear), '-x') || ' | ' ||
                  COALESCE(s.policyeffectivedate, '-x') || ' | ' ||
                  COALESCE(s.policyexpirationdate, '-x') || ' | ' ||
                  COALESCE(s.policycoveragetype, '-x') || ' | ' ||
                  COALESCE(s.policycoveragekind, '-x') || ' | ' ||
                  COALESCE(s.claimantnamefull, '-x') || ' | ' ||
                  COALESCE(s.claimstatus, '-x') || ' | ' ||
                  COALESCE(s.claimantage, '-x') || ' | ' ||
                  COALESCE(s.claimcloseddate, '-x') || ' | ' ||
                  COALESCE(s.claimmajorclasscode, '-x') || ' | ' ||
                  COALESCE(s.lossdatetime, '-x') || ' | ' ||
                  COALESCE(s.losstype, '-x') || ' | ' ||
                  COALESCE(s.lossstate, '-x') || ' | ' ||
                  COALESCE(s.lossaccidentdescription, '-x') || ' | ' ||
                  COALESCE(s.valuationdate, '-x') || ' | ' ||
                  COALESCE(s.currencytype, '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.indemnityincurred), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.paidindemnitypaid), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.reserveindemnity), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.medicalincurred), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.reservemedical), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.medicalpaid), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.expensesincurred), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.reservesexpense), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.expensepaid), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.propertyincurred), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.propertyreserve), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.propertydamagepaid), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.totalrecoveries), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.paidlegal), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.paidbodilyinjury), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.reservetotal), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.totalpaid), '-x') || ' | ' ||
                  COALESCE(TO_VARCHAR(s.totalincurred), '-x') || ' | ' ||
                  COALESCE(s.source_company, '-x') || ' | '
              ),
              s.HashSum = 
                  s.indemnityincurred +
                  s.paidindemnitypaid +
                  s.reserveindemnity +
                  s.medicalincurred +
                  s.medicalpaid +
                  s.reservemedical +
                  s.expensesincurred +
                  s.expensepaid +
                  s.reservesexpense +
                  s.propertyincurred +
                  s.propertydamagepaid +
                  s.propertyreserve +
                  s.paidlegal +
                  s.paidbodilyinjury +
                  s.reservetotal +
                  s.totalpaid +
                  s.totalincurred +
                  s.totalrecoveries;

          CREATE OR REPLACE TEMPORARY TABLE tmpRowRank AS
          SELECT DISTINCT s.guid,
              s.claimnumber,
              s.claimnumbersuffix,
              s.hashSum,
              s.RecordHashByte,
              ROW_NUMBER() OVER (PARTITION BY s.guid ORDER BY s.hashSum DESC) as rowRank
          FROM ALLIANT_ONE.STG.AO_CLAIM_STAGING s;

          UPDATE ALLIANT_ONE.STG.AO_CLAIM_STAGING s
          SET s.sf_account_id = source.sf_account_id,
              s.rowrank = source.rowRank,
              s.sf_account_owner_id = source.sf_account_owner_id
          FROM (
              SELECT 
                  s_inner.guid,
                  s_inner.RecordHashByte,
                  s_inner.claimnumber,
                  s_inner.claimnumbersuffix,
                  r.sf_account_id,
                  t.rowRank,
                  r.sf_account_owner_id
              FROM ALLIANT_ONE.STG.AO_CLAIM_STAGING s_inner
              LEFT JOIN (
                  SELECT DISTINCT epic_client_lookup_code, sf_account_id, sf_account_owner_id
                  FROM ALLIANT_ONE.DBO.AO_RESPONSE_FEED
                  WHERE sf_account_id IS NOT NULL
              ) r ON s_inner.epiclookupcode = r.epic_client_lookup_code
              LEFT JOIN tmpRowRank t ON s_inner.guid = t.guid
                  AND s_inner.RecordHashByte = t.RecordHashByte
                  AND s_inner.claimnumber = t.claimnumber
                  AND COALESCE(s_inner.claimnumbersuffix, 'xx') = COALESCE(t.claimnumbersuffix, 'xx')
          ) AS source
          WHERE s.guid = source.guid
            AND s.RecordHashByte = source.RecordHashByte
            AND s.claimnumber = source.claimnumber
            AND COALESCE(s.claimnumbersuffix, 'xx') = COALESCE(source.claimnumbersuffix, 'xx');

          DROP TABLE IF EXISTS tmpRowRank;
      END;
    testsEnabled: true
    truncateBefore: false
