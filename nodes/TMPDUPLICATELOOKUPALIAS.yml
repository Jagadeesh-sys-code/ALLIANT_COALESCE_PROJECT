          joinCondition: "WITH DUP AS (\n    SELECT\n        SOURCE_SYSTEM_CLIENT_LOOKUP_CODE,\n\
            \        COUNT(DISTINCT DW_SOURCE_SYSTEM_ID) AS DW_SOURCE_SYSTEM_ID_COUNT,\n\
            \        COUNT(DISTINCT PARENT_PLANNING_ID) AS PARENT_PLANNING_ID_COUNT\n\
            \    FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT') }}\n\
            \    GROUP BY SOURCE_SYSTEM_CLIENT_LOOKUP_CODE\n    HAVING COUNT(DISTINCT\
            \ DW_SOURCE_SYSTEM_ID) > 1\n    AND COUNT(DISTINCT PARENT_PLANNING_ID)\
            \ = 1\n)\nFROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_CLIENT')\
            \ }} AS C\nINNER JOIN DUP ON C.SOURCE_SYSTEM_CLIENT_LOOKUP_CODE = DUP.SOURCE_SYSTEM_CLIENT_LOOKUP_CODE"
