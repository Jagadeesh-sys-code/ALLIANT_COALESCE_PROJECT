          joinCondition: "FROM {{ ref('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_BROKER')\
            \ }} AS C\nINNER JOIN (\n  SELECT SOURCE_SYSTEM_BROKER_LOOKUP_CODE \n\
