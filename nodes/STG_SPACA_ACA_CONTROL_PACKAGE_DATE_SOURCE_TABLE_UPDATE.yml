            \ }} AS T\n    ON T.ACA_CONTROL_PACKAGE_SOURCE_TABLE_ID = DT.ACA_CONTROL_PACKAGE_SOURCE_TABLE_ID\n\
            WHERE D.ACA_CONTROL_PACKAGE_DATE_ID = {{ parameters.ICONTROLPACKAGEDATEID\
