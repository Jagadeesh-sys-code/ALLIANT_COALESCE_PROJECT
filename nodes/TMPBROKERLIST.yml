  name: TMPBROKERLIST
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    LET NO_ROWS INT := 300;\n    LET MAX_GROUP_ID INT;\n    LET\
      \ COUNT_OF_MAX_GROUP_ID INT;\n    LET MAX_EXISTING_GROUP_ID INT;\n    LET EXISTING_GROUP_ROW_COUNT\
      \ INT := 0;\n    LET NEW_GROUP_COUNT INT := 0;\n    LET NEW_GROUP_ROWS INT :=\
      \ 0;\n    LET COUNTER INT;\n\n    SELECT MAX(TRY_CAST(REPLACE(T.EXISTING_PARENT_PLANNING_ID,\
      \ '_Producer_Parent', '') AS INT))\n    INTO :MAX_EXISTING_GROUP_ID\n    FROM\
      \ {{ ref_no_link('PLANNING_ALLIANT_DBO', 'TMPBROKERLIST') }} AS T;\n\n    SELECT\
      \ MAX(TRY_CAST(SUBSTRING(P.PARENT_PLANNING_ID, 1, POSITION('_' IN P.PARENT_PLANNING_ID)-1)\
      \ AS INT))\n    INTO :MAX_GROUP_ID\n    FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER\
      \ AS P;\n\n    SELECT COUNT(1)\n    INTO :COUNT_OF_MAX_GROUP_ID\n    FROM PLANNING_ALLIANT.DBO.PLANNING_FCCS_BROKER\
      \ AS P\n    WHERE TRY_CAST(SUBSTRING(P.PARENT_PLANNING_ID, 1, POSITION('_' IN\
      \ P.PARENT_PLANNING_ID)-1) AS INT) = :MAX_GROUP_ID;\n\n    IF (:MAX_EXISTING_GROUP_ID\
      \ = :MAX_GROUP_ID) THEN\n        COUNT_OF_MAX_GROUP_ID := 0;\n    END IF;\n\n\
      \    IF (:MAX_GROUP_ID IS NOT NULL AND :MAX_EXISTING_GROUP_ID <> :MAX_GROUP_ID)\
      \ THEN\n        LET ROWS_TO_UPDATE INT := :NO_ROWS - :COUNT_OF_MAX_GROUP_ID;\n\
      \        IF (ROWS_TO_UPDATE > 0) THEN\n            UPDATE {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'TMPBROKERLIST') }} TGT\n            SET\n                NEW_PARENT_GROUP_ID\
      \ = :MAX_GROUP_ID,\n                NEW_PARENT_PLANNING_ID = :MAX_GROUP_ID ||\
      \ '_Producer_Parent',\n                NEW_PARENT_BROKER_COUNT = :COUNT_OF_MAX_GROUP_ID\
      \ + SRC.RN\n            FROM (\n                SELECT T.ROW_ID, ROW_NUMBER()\
      \ OVER (ORDER BY T.ROW_ID) AS RN\n                FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'TMPBROKERLIST') }} AS T\n                WHERE T.NEW_PARENT_GROUP_ID IS NULL\n\
      \                QUALIFY RN <= :ROWS_TO_UPDATE\n            ) SRC\n        \
      \    WHERE TGT.ROW_ID = SRC.ROW_ID;\n\n            SELECT IFF(SQLROWCOUNT IS\
      \ NULL, 0, SQLROWCOUNT) INTO :EXISTING_GROUP_ROW_COUNT;\n        END IF;\n\n\
      \    COUNTER := COALESCE(:MAX_GROUP_ID, 0) + 1;\n    \n    WHILE ( (SELECT COUNT(1)\
      \ FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'TMPBROKERLIST') }} AS T WHERE\
      \ T.NEW_PARENT_GROUP_ID IS NULL) > 0 ) DO\n    \n        UPDATE {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'TMPBROKERLIST') }} TGT\n        SET\n            NEW_PARENT_GROUP_ID = :COUNTER,\n\
      \            NEW_PARENT_PLANNING_ID = :COUNTER || '_Producer_Parent',\n    \
      \        NEW_PARENT_BROKER_COUNT = (TGT.ROW_ID - :EXISTING_GROUP_ROW_COUNT -\
      \ :NEW_GROUP_ROWS),\n            NEW_PARENT_FLAG = 'Y'\n        FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'TMPBROKERLIST') }} TGT_INNER\n        WHERE TGT.ROW_ID = TGT_INNER.ROW_ID\
      \ AND TGT.NEW_PARENT_GROUP_ID IS NULL\n        QUALIFY ROW_NUMBER() OVER (ORDER\
      \ BY TGT.ROW_ID) <= :NO_ROWS;\n\n        COUNTER := :COUNTER + 1;\n        NEW_GROUP_COUNT\
      \ := :NEW_GROUP_COUNT + 1;\n        NEW_GROUP_ROWS := :NO_ROWS * :NEW_GROUP_COUNT;\n\
      \n    END WHILE;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
