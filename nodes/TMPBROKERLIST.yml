  name: TMPBROKERLIST
  type: sql
  config:
    insertStrategy: INSERT
    postSQL: "BEGIN\n    USE DATABASE PLANNING_ALLIANT;\n\n    UPDATE {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMPBROKERLIST') }} AS TGT\n    SET\n        NEW_PARENT_GROUP_ID = SRC.MAX_GROUP_ID,\n\
      \        NEW_PARENT_PLANNING_ID = SRC.MAX_GROUP_ID || '_Producer_Parent',\n\
      \        NEW_PARENT_BROKER_COUNT = SRC.COUNT_OF_MAX_GROUP_ID + SRC.RN\n    FROM\
      \ (\n        SELECT\n            T.ROW_ID,\n            CFG.MAX_GROUP_ID,\n\
      \            CFG.COUNT_OF_MAX_GROUP_ID,\n            ROW_NUMBER() OVER (ORDER\
      \ BY T.ROW_ID) AS RN\n        FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMPBROKERLIST') }} T\n        CROSS JOIN (\n            SELECT\n        \
      \        MAX_GROUP_ID,\n                (CASE WHEN MAX_EXISTING_GROUP_ID = MAX_GROUP_ID\
      \ THEN 0 ELSE COUNT_OF_MAX_GROUP_ID END) AS COUNT_OF_MAX_GROUP_ID,\n       \
      \         MAX_EXISTING_GROUP_ID,\n                MAX_GROUP_ID IS NOT NULL AND\
      \ MAX_EXISTING_GROUP_ID <> MAX_GROUP_ID AS SHOULD_FILL\n            FROM (\n\
      \                SELECT\n                   (SELECT MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1,\
      \ POSITION('_', PARENT_PLANNING_ID)-1) AS INT)) FROM {{ ref_no_link('PLANNING_ALLIANT_DBO',\
      \ 'PLANNING_FCCS_BROKER') }}) AS MAX_GROUP_ID,\n                   (SELECT COUNT(1)\
      \ FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_BROKER') }}  WHERE\
      \ TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1, POSITION('_', PARENT_PLANNING_ID)-1)\
      \ AS INT) = MAX_GROUP_ID) AS COUNT_OF_MAX_GROUP_ID,\n                   (SELECT\
      \ MAX(EXISTING_GROUP_ID) FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPBROKERLIST')\
      \ }}) AS MAX_EXISTING_GROUP_ID\n            ) AS PRE_CFG\n        ) CFG\n  \
      \      WHERE T.NEW_PARENT_GROUP_ID IS NULL AND CFG.SHOULD_FILL\n    ) SRC\n\
      \    WHERE TGT.ROW_ID = SRC.ROW_ID\n      AND SRC.RN <= (300 - SRC.COUNT_OF_MAX_GROUP_ID);\n\
      \n    UPDATE {{ ref_no_link('PLANNING_ALLIANT_STAGING', 'TMPBROKERLIST') }}\
      \ AS TGT\n    SET\n        NEW_PARENT_GROUP_ID = SRC.ASSIGNED_GROUP_ID,\n  \
      \      NEW_PARENT_PLANNING_ID = SRC.ASSIGNED_GROUP_ID || '_Producer_Parent',\n\
      \        NEW_PARENT_BROKER_COUNT = SRC.RN_IN_GROUP,\n        NEW_PARENT_FLAG\
      \ = 'Y'\n    FROM (\n        SELECT\n            R.ROW_ID,\n            COALESCE(CFG.STARTING_GROUP_ID,\
      \ 0) + CEIL(R.RN / 300.0) AS ASSIGNED_GROUP_ID,\n            ROW_NUMBER() OVER\
      \ (PARTITION BY ASSIGNED_GROUP_ID ORDER BY R.ROW_ID) AS RN_IN_GROUP\n      \
      \  FROM (\n            SELECT\n                ROW_ID,\n                ROW_NUMBER()\
      \ OVER (ORDER BY ROW_ID) AS RN\n            FROM {{ ref_no_link('PLANNING_ALLIANT_STAGING',\
      \ 'TMPBROKERLIST') }}\n            WHERE NEW_PARENT_GROUP_ID IS NULL\n     \
      \   ) AS R\n        CROSS JOIN (\n            SELECT\n                COALESCE(MAX(TRY_CAST(SUBSTRING(PARENT_PLANNING_ID,1,\
      \ POSITION('_', PARENT_PLANNING_ID)-1) AS INT)), 0) AS STARTING_GROUP_ID\n \
      \           FROM {{ ref_no_link('PLANNING_ALLIANT_DBO', 'PLANNING_FCCS_BROKER')\
      \ }}\n        ) AS CFG\n    ) AS SRC\n    WHERE TGT.ROW_ID = SRC.ROW_ID;\nEND;"
    preSQL: ''
    testsEnabled: true
    truncateBefore: true
